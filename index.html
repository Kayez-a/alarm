<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="dashboard-header">
        <div class="greeting-container">
            <h1 id="greeting">Good Morning!</h1>
            <p id="datetime">Loading date & time...</p>
        </div>
        <button id="theme-toggle" title="Toggle Light/Dark Mode">🌙</button>
    </header>

    <main class="dashboard-grid">
        <section class="card focus-card">
            <h2>Focus Timer</h2>
            <div class="timer-display" id="time-display">25:00</div>
            
            <div class="timer-controls">
                <button id="start-btn">Start</button>
                <button id="stop-btn">Stop</button>
                <button id="reset-btn">Reset</button>
            </div>
            
            <div class="timer-settings">
                <label for="custom-time">Set Minutes:</label>
                <input type="number" id="custom-time" value="25" min="1" max="120">
                <button id="set-time-btn">Update</button>
            </div>
        </section>

        <section class="card todo-card">
            <h2>To-Do List</h2>
            <div class="input-group">
                <input type="text" id="task-input" placeholder="What needs to be done?">
                <button id="add-task-btn">Add</button>
            </div>
            <p id="duplicate-warning" class="hidden warning">Task already exists!</p>
            <ul id="task-list"></ul>
        </section>

        <section class="card links-card">
            <h2>Quick Links</h2>
            <div class="input-group">
                <input type="text" id="link-name" placeholder="Name (e.g., Google)">
                <input type="url" id="link-url" placeholder="URL (e.g., https://google.com)">
                <button id="add-link-btn">Add</button>
            </div>
            <div id="links-container" class="links-grid"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
